    if hasattr(predictor, 'conditional_matrices') and predictor.conditional_matrices:
        # Feature selection
        selected_feature = st.selectbox(
            "Selecciona una variable para analizar:",
            list(predictor.conditional_matrices.keys())
        )

        if selected_feature:
            conditional_mats = predictor.conditional_matrices[selected_feature]

            st.subheader(f"Matrices Condicionales: {selected_feature}")

            # Display all conditional matrices in a grid
            values = list(conditional_mats.keys())
            n_values = len(values)
            cols_per_row = 2
            n_rows = (n_values + cols_per_row - 1) // cols_per_row

            for row in range(n_rows):
                cols = st.columns(cols_per_row)

                for col_idx in range(cols_per_row):
                    value_idx = row * cols_per_row + col_idx

                    if value_idx < n_values:
                        value = values[value_idx]
                        matrix = conditional_mats[value]

                        with cols[col_idx]:
                            st.plotly_chart(
                                create_transition_matrix_heatmap(
                                    matrix,
                                    f"{selected_feature} = {value}"
                                ),
                                use_container_width=True
                            )

            st.markdown("---")

            # Comparative analysis
            st.subheader("Análisis Comparativo")

            # Calculate stability for each category
            stability_data = []
            improvement_data = []

            for value, matrix in conditional_mats.items():
                stability = np.trace(matrix) / len(STATES)

                # Calculate average improvement probability (moving to higher states)
                improvement_prob = 0
                count = 0
                for i in range(len(STATES)):
                    for j in range(i+1, len(STATES)):
                        improvement_prob += matrix[i, j]
                        count += 1
                improvement_prob = improvement_prob / count if count > 0 else 0

                stability_data.append({
                    'Valor': str(value),
                    'Estabilidad': stability,
                    'P(Mejora)': improvement_prob
                })

            df_comparison = pd.DataFrame(stability_data)

            col1, col2 = st.columns(2)

            with col1:
                # Stability comparison
                fig = go.Figure(go.Bar(
                    x=df_comparison['Valor'],
                    y=df_comparison['Estabilidad'],
                    marker_color='#2E86AB',
                    text=[f'{v:.1%}' for v in df_comparison['Estabilidad']],
                    textposition='auto'
                ))

                fig.update_layout(
                    title=f"Estabilidad por {selected_feature}",
                    xaxis_title=selected_feature,
                    yaxis_title="Estabilidad",
                    height=400
                )

                st.plotly_chart(fig, use_container_width=True)

            with col2:
                # Improvement probability
                fig = go.Figure(go.Bar(
                    x=df_comparison['Valor'],
                    y=df_comparison['P(Mejora)'],
                    marker_color='#06A77D',
                    text=[f'{v:.1%}' for v in df_comparison['P(Mejora)']],
                    textposition='auto'
                ))

                fig.update_layout(
                    title=f"Probabilidad de Mejora por {selected_feature}",
                    xaxis_title=selected_feature,
                    yaxis_title="P(Mejora)",
                    height=400
                )

                st.plotly_chart(fig, use_container_width=True)

            # Table with all metrics
            st.dataframe(
                df_comparison.style.background_gradient(subset=['Estabilidad', 'P(Mejora)'], cmap='RdYlGn'),
                use_container_width=True
            )

            st.markdown("---")

            # Feature Impact Ranking
            st.subheader("Ranking de Impacto")

            # Calculate variance in predictions as proxy for impact
            variance_scores = []

            for feature, matrices in predictor.conditional_matrices.items():
                # Calculate variance in stability across categories
                stabilities = [np.trace(mat) / len(STATES) for mat in matrices.values()]
                variance = np.var(stabilities)

                variance_scores.append({
                    'Variable': feature,
                    'Varianza de Estabilidad': variance,
                    'Impacto': 'Alto' if variance > 0.01 else 'Medio' if variance > 0.005 else 'Bajo'
                })

            df_impact = pd.DataFrame(variance_scores).sort_values('Varianza de Estabilidad', ascending=False)

            fig = go.Figure(go.Bar(
                x=df_impact['Varianza de Estabilidad'],
                y=df_impact['Variable'],
                orientation='h',
                marker=dict(
                    color=df_impact['Varianza de Estabilidad'],
                    colorscale='Viridis',
                    showscale=True
                ),
                text=[f'{v:.4f}' for v in df_impact['Varianza de Estabilidad']],
                textposition='auto'
            ))

            fig.update_layout(
                title="Ranking de Impacto de Variables",
                xaxis_title="Varianza de Estabilidad (mayor = más impacto)",
                yaxis_title="Variable",
                height=400
            )

            st.plotly_chart(fig, use_container_width=True)

            st.info("""
            **Interpretación:**
            - Mayor varianza = la variable tiene diferente efecto según su valor
            - Bajo impacto = la variable no diferencia mucho el comportamiento
            """)

    else:
        st.warning("No hay matrices condicionales disponibles. El modelo no fue entrenado con variables contextuales.")

# ==================== TAB 4: BACKTESTING ====================

with tab4:
    st.header("Backtesting y Validación Temporal")

    if has_data:
