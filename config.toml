# ==================== UTILITY FUNCTIONS ====================

def create_confusion_matrix_plot(cm: np.ndarray, labels: List[str], normalized: bool = False) -> go.Figure:
    """Create interactive confusion matrix heatmap."""
    if normalized:
        cm_display = cm.astype('float') / cm.sum(axis=1)[:, np.newaxis]
        text_template = '%{z:.2%}'
        title = "Matriz de Confusión (Normalizada)"
    else:
        cm_display = cm
        text_template = '%{z:d}'
        title = "Matriz de Confusión"

    fig = go.Figure(data=go.Heatmap(
        z=cm_display,
        x=labels,
        y=labels,
        colorscale='Blues',
        text=cm_display,
        texttemplate=text_template,
        textfont={"size": 12},
        colorbar=dict(title="Proporción" if normalized else "Cantidad")
    ))

    fig.update_layout(
        title=title,
        xaxis_title="Predicción",
        yaxis_title="Valor Real",
        height=500,
        width=600
    )

    # Highlight diagonal
    for i in range(len(labels)):
        fig.add_shape(
            type="rect",
            x0=i-0.5, y0=i-0.5,
            x1=i+0.5, y1=i+0.5,
            line=dict(color="red", width=2)
        )

    return fig


def create_transition_matrix_heatmap(matrix: np.ndarray, title: str = "Matriz de Transición") -> go.Figure:
    """Create transition matrix heatmap."""
    fig = go.Figure(data=go.Heatmap(
        z=matrix,
        x=STATES,
        y=STATES,
        colorscale='YlOrRd',
        text=matrix,
        texttemplate='%{z:.3f}',
        textfont={"size": 11},
        colorbar=dict(title="Probabilidad")
    ))

    fig.update_layout(
        title=title,
        xaxis_title="Estado Destino",
        yaxis_title="Estado Origen",
        height=450,
        width=500
    )

    return fig


def create_eigenvalue_plot(eigenvalues: np.ndarray) -> go.Figure:
    """Create eigenvalue visualization."""
    fig = make_subplots(
        rows=1, cols=2,
        subplot_titles=("Magnitud de Eigenvalores", "Plano Complejo"),
        specs=[[{"type": "bar"}, {"type": "scatter"}]]
    )

    # Bar plot of magnitudes
    magnitudes = np.abs(eigenvalues)
    indices = list(range(len(eigenvalues)))

    fig.add_trace(
        go.Bar(
            x=indices,
            y=magnitudes,
            marker_color=['#2E86AB' if i == 0 else '#A23B72' for i in indices],
            name='Magnitud'
        ),
        row=1, col=1
    )

    # Add threshold line
    fig.add_hline(y=1.0, line_dash="dash", line_color="red", row=1, col=1)

    # Complex plane
    real_parts = np.real(eigenvalues)
    imag_parts = np.imag(eigenvalues)

    # Unit circle
    theta = np.linspace(0, 2*np.pi, 100)
    fig.add_trace(
        go.Scatter(
            x=np.cos(theta),
            y=np.sin(theta),
            mode='lines',
            line=dict(color='red', dash='dash'),
            name='Círculo Unitario',
            showlegend=False
        ),
        row=1, col=2
    )

    # Eigenvalues
    fig.add_trace(
        go.Scatter(
            x=real_parts,
            y=imag_parts,
            mode='markers',
            marker=dict(
                size=12,
                color=['#2E86AB' if i == 0 else '#A23B72' for i in indices],
                line=dict(color='white', width=2)
            ),
            text=[f'λ{i+1}' for i in indices],
            textposition='top center',
            name='Eigenvalores'
        ),
        row=1, col=2
    )

    fig.update_xaxes(title_text="Índice", row=1, col=1)
    fig.update_yaxes(title_text="Magnitud", row=1, col=1)
    fig.update_xaxes(title_text="Parte Real", row=1, col=2)
    fig.update_yaxes(title_text="Parte Imaginaria", row=1, col=2)

    fig.update_layout(height=400, showlegend=True)

    return fig


def create_steady_state_comparison(current_dist: np.ndarray, steady_dist: np.ndarray) -> go.Figure:
    """Compare current and steady state distributions."""
    fig = go.Figure()

    x = np.arange(len(STATES))
    width = 0.35

    fig.add_trace(go.Bar(
        x=[s + " (Actual)" for s in STATES],
        y=current_dist,
        name='Distribución Actual',
        marker_color='#2E86AB'
    ))

    fig.add_trace(go.Bar(
        x=[s + " (Estable)" for s in STATES],
        y=steady_dist,
        name='Estado Estable',
        marker_color='#A23B72'
    ))

    fig.update_layout(
        title="Comparación: Distribución Actual vs Estado Estable",
        xaxis_title="Estado",
        yaxis_title="Proporción",
        height=400,
        barmode='group'
    )

    return fig


def calculate_model_metrics(predictor: MarkovEngagementPredictor, test_data: pd.DataFrame) -> Dict[str, Any]:
    """Calculate comprehensive model metrics."""
    # Predict on test data
    y_true = []
    y_pred = []

    for _, row in test_data.iterrows():
        current_state = row['current_state']
        actual_next = row['next_state']

        pred = predictor.predict_next_state(current_state, None, 1)
        predicted_state = max(pred.items(), key=lambda x: x[1])[0]

        y_true.append(actual_next)
        y_pred.append(predicted_state)

    # Calculate metrics
    accuracy = accuracy_score(y_true, y_pred)
    cm = confusion_matrix(y_true, y_pred, labels=STATES)
    report = classification_report(y_true, y_pred, labels=STATES, output_dict=True)

    return {
        'accuracy': accuracy,
        'confusion_matrix': cm,
        'classification_report': report,
        'y_true': y_true,
        'y_pred': y_pred
    }


